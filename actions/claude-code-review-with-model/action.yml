name: 'Claude Code Review'
description: 'Runs a Claude Code Review on the current branch/PR.'

inputs:
  claude_code_oauth_token:
    description: 'OAuth token for Claude Code'
    required: false
  anthropic_api_key:
    description: 'Anthropic API key for Claude Code'
    required: false
  claude_model:
    description: 'Claude model to use (full name or alias like haiku, sonnet, opus)'
    required: false
  verify_author_write:
    description: 'If true, verifies the author has write access. If false, skips check.'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Resolve Claude Model
      id: resolve
      uses: ./actions/claude-resolve-model
      with:
        claude_code_oauth_token: ${{ inputs.claude_code_oauth_token }}
        anthropic_api_key: ${{ inputs.anthropic_api_key }}
        claude_model: ${{ inputs.claude_model }}
        verify_author_write: ${{ inputs.verify_author_write }}

    - name: Checkout repository
      if: steps.resolve.outputs.authorized == 'true'
      uses: actions/checkout@v5
      with:
        fetch-depth: 1

    - name: Build claude_args
      id: args
      if: steps.resolve.outputs.authorized == 'true'
      shell: bash
      run: |
        ARGS='--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'
        if [ -n "${{ steps.resolve.outputs.model }}" ]; then
          ARGS="--model ${{ steps.resolve.outputs.model }} $ARGS"
        fi
        echo "value=$ARGS" >> "$GITHUB_OUTPUT"

    - name: Run Claude Code Review
      if: steps.resolve.outputs.authorized == 'true'
      uses: anthropics/claude-code-action@v1
      with:
        claude_code_oauth_token: ${{ inputs.claude_code_oauth_token }}
        anthropic_api_key: ${{ inputs.anthropic_api_key }}
        claude_args: ${{ steps.args.outputs.value }}
        prompt: |
          Please review this pull request and provide feedback on:
          - Code quality and best practices
          - Potential bugs or issues
          - Performance considerations
          - Security concerns
          - Test coverage

          Use the repository's CLAUDE.md for guidance on style and conventions. Be constructive and helpful in your feedback.

          Use `gh pr comment` with your Bash tool to leave your review as a comment on the PR.
